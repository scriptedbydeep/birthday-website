<!DOCTYPE html>
<html>

<head>
<title>Happy Birthday Princess</title>

<style>

body{
background:#ffe6f0;
font-family:Arial;
text-align:center;
margin:0;
padding:0;
border:15px solid #ff99cc;
}

/* intro */

#intro{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#intro h1{
font-size:60px;
color:#ff1a75;
opacity:0;
animation:fadeIn 3s forwards;
}

.enter-btn{
margin-top:30px;
font-size:28px;
padding:15px 40px;
background:#ff4d88;
color:white;
border:none;
border-radius:15px;
cursor:pointer;
}

.enter-btn:hover{
transform:scale(1.05);
}

/* teddy */

.teddy{
position:fixed;
width:90px;
top:20px;
}

.teddy.left{ left:20px; }
.teddy.right{ right:20px; }

/* gallery */

#gallery{
display:none;
padding-top:60px;
}

.section-title{
font-size:40px;
color:#ff1a75;
margin-bottom:40px;
}

.photo-grid{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}
.cover{
position:absolute;
width:100%;
height:100%;
background:#ffb3d9;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
color:#b30059;
}

.photo-box{
width:250px;
height:250px;
background:#ffcce6;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
position:relative;
overflow:hidden;
}

.photo-box img{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

.photo-box p{
position:absolute;
bottom:0;
background:rgba(255,255,255,0.9);
width:100%;
padding:10px;
font-size:16px;
display:none;
}
/* surprise button */

.surprise-section{
margin-top:80px;
margin-bottom:100px;
}

.surprise-btn{
font-size:34px;
padding:20px 45px;
background:#ff4d88;
color:white;
text-decoration:none;
border-radius:18px;
font-weight:bold;
}

.surprise-btn:hover{
background:#ff1a75;
transform:scale(1.1);
}

/* animation */

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<!-- teddy bears -->




<!-- intro screen -->

<div id="intro">

<h1>Happy Birthday Princess 👑</h1>

<button class="enter-btn" onclick="enterSite()">Enter</button>

</div>


<!-- gallery -->

<div id="gallery">

<h2 class="section-title">What I Like About You 💖</h2>

<div class="photo-grid">

<div class="photo-box" onclick="reveal(this)">
    <div class="cover">Click me 💖</div>
    <img src="WhatsApp Image 2026-03-03 at 10.34.21 PM.jpeg">
    <p>Your smile literally makes everything better.</p>
</div>

<div class="photo-box" onclick="reveal(this)">
    <div class="cover">Click me 💖</div>
    <img src="M.jpeg">
    <p>You are the most wonderful person i ever met.</p>
</div>

<div class="photo-box" onclick="reveal(this)">
    <div class="cover">Click me 💖</div>
    <img src="pic.jpeg">
    <p>I love every moment spent with you.</p>
</div>

<div class="photo-box" onclick="reveal(this)">
    <div class="cover">Click me 💖</div>
    <img src="WhatsApp Image 2026-03-07 at 4.21.39 PM.jpeg">
    <p>You make life feel special.</p>
</div>

</div>


<!-- surprise button -->

<div class="surprise-section">

<a href="surprise.html" class="surprise-btn">
🎁 Click Here For A Lil Surprise 🎁
</a>

</div>

</div>


<script>

/* enter site */

function enterSite(){

document.getElementById("intro").style.display="none";
document.getElementById("gallery").style.display="block";

}

/* reveal photo */

function reveal(box){

const cover = box.querySelector(".cover");
const img = box.querySelector("img");
const msg = box.querySelector("p");

cover.style.display="none";
img.style.display="block";
msg.style.display="block";

}

</script>

</body>
</html>
